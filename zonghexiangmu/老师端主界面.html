<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钛考 - 老师端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .admin-layout {
            height: 100vh;
            display: flex;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 200px;
            background-color: #304156;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .logo {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2b2f3a;
            color: white;
            margin: 0;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }

        .logo-text {
            font-size: 18px;
            font-weight: bold;
        }

        .sidebar-menu {
            flex: 1;
            background-color: #304156;
            border: none;
            padding: 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #bfcbd9;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background-color: #263445;
            color: #409EFF;
        }

        .menu-item.active {
            background-color: #263445;
            color: #409EFF;
            border-left-color: #409EFF;
        }

        .menu-item .icon {
            margin-right: 8px;
            font-size: 16px;
        }

        /* 主内容区样式 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #fff;
            border-bottom: 1px solid #e6e6e6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 60px;
        }

        .header-left {
            flex: 1;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            color: #606266;
            font-size: 14px;
        }

        .breadcrumb-item {
            color: #606266;
            text-decoration: none;
        }

        .breadcrumb-item:hover {
            color: #409EFF;
        }

        .breadcrumb-separator {
            margin: 0 8px;
            color: #c0c4cc;
        }

        .header-right {
            display: flex;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #606266;
            padding: 8px 12px;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .user-info:hover {
            background-color: #f5f7fa;
        }

        .user-info .icon {
            margin-right: 5px;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border: 1px solid #e4e7ed;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            min-width: 120px;
            z-index: 1000;
            display: none;
        }

        .dropdown-item {
            display: block;
            padding: 8px 16px;
            color: #606266;
            text-decoration: none;
            transition: all 0.3s;
        }

        .dropdown-item:hover {
            background-color: #f5f7fa;
            color: #409EFF;
        }

        .main-content {
            flex: 1;
            background-color: #f5f5f5;
            padding: 20px;
            overflow-y: auto;
        }

        .welcome-card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 24px;
            color: #303133;
            margin-bottom: 10px;
        }

        .welcome-subtitle {
            color: #606266;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #409EFF;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #606266;
            font-size: 14px;
        }

        .quick-actions {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .quick-actions h3 {
            margin-bottom: 15px;
            color: #303133;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .action-btn {
            padding: 12px 20px;
            background: #409EFF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .action-btn:hover {
            background: #337ecc;
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            background: #67c23a;
        }

        .action-btn.secondary:hover {
            background: #529b2e;
        }

        .action-btn.warning {
            background: #e6a23c;
        }

        .action-btn.warning:hover {
            background: #cf9236;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">钛</div>
                <div class="logo-text">钛考</div>
            </div>
            <div class="sidebar-menu">
                <a href="#" class="menu-item active">
                    <span class="icon">🏠</span>
                    <span>仪表盘</span>
                </a>
                <a href="#" class="menu-item">
                    <span class="icon">📚</span>
                    <span>题库管理</span>
                </a>
                <a href="#" class="menu-item">
                    <span class="icon">📝</span>
                    <span>组卷管理</span>
                </a>
                <a href="#" class="menu-item">
                    <span class="icon">📋</span>
                    <span>考试管理</span>
                </a>
                <a href="#" class="menu-item">
                    <span class="icon">👥</span>
                    <span>学生管理</span>
                </a>
                <a href="#" class="menu-item">
                    <span class="icon">📊</span>
                    <span>成绩分析</span>
                </a>
                <a href="#" class="menu-item">
                    <span class="icon">🎯</span>
                    <span>监考中心</span>
                </a>
                <a href="#" class="menu-item">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </a>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-container">
            <!-- 顶部导航 -->
            <div class="header">
                <div class="header-left">
                    <div class="breadcrumb">
                        <a href="#" class="breadcrumb-item">首页</a>
                        <span class="breadcrumb-separator">/</span>
                        <span class="breadcrumb-item">仪表盘</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info" onclick="toggleDropdown()">
                        <span class="icon">👤</span>
                        <span>张老师</span>
                        <span class="icon">▼</span>
                    </div>
                    <div class="dropdown-menu" id="userDropdown">
                        <a href="#" class="dropdown-item">个人设置</a>
                        <a href="#" class="dropdown-item" onclick="handleLogout()">退出登录</a>
                    </div>
                </div>
            </div>
            
            <!-- 内容区域 -->
            <div class="main-content">
                <div class="welcome-card">
                    <h1 class="welcome-title">欢迎使用钛考在线考试系统</h1>
                    <p class="welcome-subtitle">重塑在线考试的信任基石，打造坚不可摧的智能评测平台</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">156</div>
                        <div class="stat-label">题库总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">23</div>
                        <div class="stat-label">进行中考试</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">1,234</div>
                        <div class="stat-label">学生总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">89</div>
                        <div class="stat-label">已完成考试</div>
                    </div>
                </div>

                <div class="quick-actions">
                    <h3>快速操作</h3>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="alert('创建考试功能')">创建考试</button>
                        <button class="action-btn secondary" onclick="alert('题库管理功能')">题库管理</button>
                        <button class="action-btn warning" onclick="alert('组卷功能')">智能组卷</button>
                        <button class="action-btn" onclick="alert('监考功能')">实时监考</button>
                        <button class="action-btn secondary" onclick="alert('成绩分析功能')">成绩分析</button>
                        <button class="action-btn warning" onclick="alert('学生管理功能')">学生管理</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDropdown() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                alert('退出登录成功');
                // 这里可以跳转到登录页面
                // window.location.href = '验证码登录.html';
            }
        }

        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('userDropdown');
            const userInfo = document.querySelector('.user-info');
            if (!userInfo.contains(event.target)) {
                dropdown.style.display = 'none';
            }
        });

        // 菜单项点击事件
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                // 移除所有active类
                document.querySelectorAll('.menu-item').forEach(menu => {
                    menu.classList.remove('active');
                });
                
                // 添加active类到当前项
                this.classList.add('active');
                
                // 更新面包屑
                const breadcrumb = document.querySelector('.breadcrumb');
                const menuText = this.querySelector('span:last-child').textContent;
                breadcrumb.innerHTML = `
                    <a href="#" class="breadcrumb-item">首页</a>
                    <span class="breadcrumb-separator">/</span>
                    <span class="breadcrumb-item">${menuText}</span>
                `;
                
                // 显示对应功能提示
                alert(`${menuText}功能开发中...`);
            });
        });
    </script>
</body>
</html>
