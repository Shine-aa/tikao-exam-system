<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钛考 - 在线考试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }

        .exam-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 考试头部 */
        .exam-header {
            background: white;
            border-bottom: 2px solid #e9ecef;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .exam-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .exam-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        .exam-meta {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #6c757d;
        }

        .exam-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .timer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            min-width: 120px;
            text-align: center;
        }

        .timer.warning {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .submit-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        /* 主内容区 */
        .exam-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 题目导航侧边栏 */
        .question-nav {
            width: 280px;
            background: white;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }

        .nav-header {
            padding: 16px;
            border-bottom: 1px solid #e9ecef;
            background: #f8f9fa;
        }

        .nav-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 25%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
        }

        .question-list {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .question-nav-item {
            width: 40px;
            height: 40px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 14px;
        }

        .question-nav-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .question-nav-item.current {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .question-nav-item.answered {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }

        .question-nav-item.flagged {
            border-color: #ffc107;
            background: #fff3cd;
            color: #856404;
        }

        .question-types {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e9ecef;
        }

        .type-title {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .type-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6c757d;
        }

        /* 题目内容区 */
        .question-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .question-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            background: #f8f9fa;
        }

        .question-number {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 8px;
        }

        .question-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        .question-meta {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #6c757d;
        }

        .question-body {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .question-text {
            font-size: 16px;
            line-height: 1.6;
            color: #2c3e50;
            margin-bottom: 24px;
        }

        .options {
            margin-bottom: 24px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #e3f2fd;
        }

        .option input[type="radio"],
        .option input[type="checkbox"] {
            margin-right: 12px;
            margin-top: 2px;
        }

        .option-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.5;
        }

        .text-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 15px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .code-editor {
            width: 100%;
            height: 300px;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .code-editor:focus {
            outline: none;
            border-color: #667eea;
        }

        .question-footer {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 1px solid #6c757d;
            background: white;
            color: #6c757d;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #6c757d;
            color: white;
        }

        .nav-btn.primary {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .nav-btn.primary:hover {
            background: #5a6fd8;
        }

        .flag-btn {
            background: #ffc107;
            color: #212529;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .flag-btn:hover {
            background: #e0a800;
        }

        .flag-btn.flagged {
            background: #dc3545;
            color: white;
        }

        .flag-btn.flagged:hover {
            background: #c82333;
        }

        /* 全屏模式 */
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: #f8f9fa;
        }

        /* 警告提示 */
        .warning-banner {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 12px 20px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .warning-banner.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="exam-layout">
        <!-- 考试头部 -->
        <div class="exam-header">
            <div class="exam-info">
                <div class="exam-title">数据结构期末考试</div>
                <div class="exam-meta">
                    <span>学生：李同学</span>
                    <span>学号：2021001</span>
                    <span>总分：100分</span>
                </div>
            </div>
            <div class="exam-controls">
                <div class="timer" id="timer">01:29:45</div>
                <button class="submit-btn" onclick="submitExam()">提交试卷</button>
            </div>
        </div>

        <!-- 警告提示 -->
        <div class="warning-banner" id="warningBanner">
            ⚠️ 检测到您离开了考试页面，请立即返回！如继续离开将记录为违规行为。
        </div>

        <!-- 主内容区 -->
        <div class="exam-content">
            <!-- 题目导航侧边栏 -->
            <div class="question-nav">
                <div class="nav-header">
                    <div class="nav-title">题目导航</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text">已完成 5/20 题</div>
                </div>
                <div class="question-list">
                    <div class="question-grid" id="questionGrid">
                        <!-- 题目导航项将通过JavaScript生成 -->
                    </div>
                    <div class="question-types">
                        <div class="type-title">题型分布</div>
                        <div class="type-stats">
                            <span>单选题：10题</span>
                            <span>多选题：5题</span>
                        </div>
                        <div class="type-stats">
                            <span>填空题：3题</span>
                            <span>编程题：2题</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 题目内容区 -->
            <div class="question-content">
                <div class="question-header">
                    <div class="question-number">第 1 题 / 共 20 题</div>
                    <div class="question-title">下列哪个数据结构是先进后出的？</div>
                    <div class="question-meta">
                        <span>题型：单选题</span>
                        <span>分值：5分</span>
                        <span>难度：中等</span>
                    </div>
                </div>

                <div class="question-body">
                    <div class="question-text">
                        请从以下选项中选择正确的答案：
                    </div>
                    <div class="options">
                        <div class="option" onclick="selectOption(this)">
                            <input type="radio" name="answer" value="A">
                            <div class="option-text">A. 队列</div>
                        </div>
                        <div class="option" onclick="selectOption(this)">
                            <input type="radio" name="answer" value="B">
                            <div class="option-text">B. 栈</div>
                        </div>
                        <div class="option" onclick="selectOption(this)">
                            <input type="radio" name="answer" value="C">
                            <div class="option-text">C. 链表</div>
                        </div>
                        <div class="option" onclick="selectOption(this)">
                            <input type="radio" name="answer" value="D">
                            <div class="option-text">D. 数组</div>
                        </div>
                    </div>
                </div>

                <div class="question-footer">
                    <div class="nav-buttons">
                        <button class="nav-btn" onclick="previousQuestion()">上一题</button>
                        <button class="nav-btn primary" onclick="nextQuestion()">下一题</button>
                    </div>
                    <button class="flag-btn" onclick="toggleFlag()">标记题目</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 考试状态
        let currentQuestion = 1;
        let totalQuestions = 20;
        let timeRemaining = 90 * 60; // 90分钟，单位：秒
        let answers = {};
        let flaggedQuestions = new Set();

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            generateQuestionNav();
            startTimer();
            setupPageVisibility();
        });

        // 生成题目导航
        function generateQuestionNav() {
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= totalQuestions; i++) {
                const navItem = document.createElement('div');
                navItem.className = 'question-nav-item';
                navItem.textContent = i;
                navItem.onclick = () => goToQuestion(i);
                
                if (i === currentQuestion) {
                    navItem.classList.add('current');
                }
                
                grid.appendChild(navItem);
            }
        }

        // 选择选项
        function selectOption(optionElement) {
            // 移除同组其他选项的选中状态
            const options = optionElement.parentElement.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            
            // 选中当前选项
            optionElement.classList.add('selected');
            optionElement.querySelector('input').checked = true;
            
            // 记录答案
            const questionId = currentQuestion;
            const answer = optionElement.querySelector('input').value;
            answers[questionId] = answer;
            
            // 更新导航状态
            updateQuestionNav(questionId, 'answered');
        }

        // 更新题目导航状态
        function updateQuestionNav(questionId, status) {
            const navItems = document.querySelectorAll('.question-nav-item');
            const navItem = navItems[questionId - 1];
            
            navItem.classList.remove('answered', 'flagged');
            if (status) {
                navItem.classList.add(status);
            }
        }

        // 跳转到指定题目
        function goToQuestion(questionId) {
            currentQuestion = questionId;
            
            // 更新导航状态
            document.querySelectorAll('.question-nav-item').forEach((item, index) => {
                item.classList.remove('current');
                if (index + 1 === questionId) {
                    item.classList.add('current');
                }
            });
            
            // 更新题目内容（这里简化处理）
            updateQuestionContent(questionId);
        }

        // 更新题目内容
        function updateQuestionContent(questionId) {
            const questionNumber = document.querySelector('.question-number');
            questionNumber.textContent = `第 ${questionId} 题 / 共 ${totalQuestions} 题`;
            
            // 这里应该根据题目ID加载对应的题目内容
            // 为了演示，我们简化处理
            console.log(`加载第 ${questionId} 题`);
        }

        // 上一题
        function previousQuestion() {
            if (currentQuestion > 1) {
                goToQuestion(currentQuestion - 1);
            }
        }

        // 下一题
        function nextQuestion() {
            if (currentQuestion < totalQuestions) {
                goToQuestion(currentQuestion + 1);
            }
        }

        // 标记题目
        function toggleFlag() {
            const flagBtn = document.querySelector('.flag-btn');
            const navItem = document.querySelectorAll('.question-nav-item')[currentQuestion - 1];
            
            if (flaggedQuestions.has(currentQuestion)) {
                flaggedQuestions.delete(currentQuestion);
                flagBtn.textContent = '标记题目';
                flagBtn.classList.remove('flagged');
                navItem.classList.remove('flagged');
            } else {
                flaggedQuestions.add(currentQuestion);
                flagBtn.textContent = '取消标记';
                flagBtn.classList.add('flagged');
                navItem.classList.add('flagged');
            }
        }

        // 计时器
        function startTimer() {
            const timerElement = document.getElementById('timer');
            
            const timer = setInterval(() => {
                timeRemaining--;
                
                const hours = Math.floor(timeRemaining / 3600);
                const minutes = Math.floor((timeRemaining % 3600) / 60);
                const seconds = timeRemaining % 60;
                
                timerElement.textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                // 最后10分钟警告
                if (timeRemaining <= 600 && timeRemaining > 0) {
                    timerElement.classList.add('warning');
                }
                
                // 时间到自动提交
                if (timeRemaining <= 0) {
                    clearInterval(timer);
                    alert('考试时间到，系统将自动提交试卷！');
                    submitExam();
                }
            }, 1000);
        }

        // 提交试卷
        function submitExam() {
            if (confirm('确定要提交试卷吗？提交后将无法修改答案。')) {
                alert('试卷提交成功！');
                // 这里应该跳转到成绩页面或考试结束页面
            }
        }

        // 页面可见性检测（防作弊）
        function setupPageVisibility() {
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    showWarning();
                } else {
                    hideWarning();
                }
            });
            
            // 检测窗口失焦
            window.addEventListener('blur', showWarning);
            window.addEventListener('focus', hideWarning);
        }

        function showWarning() {
            document.getElementById('warningBanner').classList.add('show');
        }

        function hideWarning() {
            document.getElementById('warningBanner').classList.remove('show');
        }

        // 防止右键和复制粘贴
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            // 禁用F12、Ctrl+Shift+I等开发者工具快捷键
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.shiftKey && e.key === 'C') ||
                (e.ctrlKey && e.shiftKey && e.key === 'J')) {
                e.preventDefault();
                showWarning();
            }
        });
    </script>
</body>
</html>
