server:
  port: 8080

# 静态资源映射配置
spring:
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/
  application:
    name: manger
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/user_auth_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password:
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Neo4j配置
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password:  # 请修改为您的Neo4j密码

# JWT配置
jwt:
  secret: your-secret-key-here-must-be-very-long-and-secure
  expiration: 86400000  # 24小时
  rememberExpiration: 2592000 # 30天
#  refresh-expiration: 2592000000  # 30天

# 验证码配置
kaptcha:
  border: no
  textproducer.font.color: black
  textproducer.char.space: 5
  textproducer.char.length: 4
  textproducer.char.string: 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ
  image.width: 120
  image.height: 40

# 短信配置
sms:
  cloopen:
    account-sid: 2c94811c9860a9c401992705f6282159
    auth-token: 03ac912e4bd741cd87ad762ba80f24f4
    app-id: 2c94811c9860a9c40199270aa2482167
    server-url: https://app.cloopen.com:8883
  code:
    length: 4
    expire-minutes: 5
  send:
    limit-seconds: 60

# Docker 代码执行配置
docker:
  execution:
    # 默认执行超时时间（秒）
    timeout: 5
    # 内存限制（256MB）
    memory: 256m
    # CPU 限制（0.5 核）
    cpus: 0.5
    # Docker 主机地址
    # Linux/Mac: unix:///var/run/docker.sock
    # Windows Docker Desktop: tcp://localhost:2375 (绕过 WSL)
    host: tcp://localhost:2375

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    display-request-duration: true
    display-operation-id: true
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    doc-expansion: none
    supported-submit-methods:
      - get
      - post
      - put
      - delete
      - patch
  show-actuator: false
  packages-to-scan: com.example.manger.controller
  paths-to-match: /api/**